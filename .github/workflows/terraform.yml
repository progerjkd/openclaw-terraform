name: Terraform

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'user-data.sh'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - 'user-data.sh'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.9.8"
  AWS_DEFAULT_REGION: us-east-1

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: fmt
    if: github.event_name == 'pull_request' && github.actor == github.repository_owner
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::699475921438:role/github-actions-openclaw-terraform
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars
        env:
          TF_VARS_CONTENT: ${{ secrets.TF_VARS }}
        run: printf '%s' "$TF_VARS_CONTENT" > terraform.tfvars

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -var="aws_profile=" 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 65000
              ? '…(truncated — see full log)\n' + plan.slice(-64000)
              : plan;
            const icon = '${{ steps.plan.outcome }}' === 'failure' ? '❌' : '✅';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan ${icon}\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: fmt
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor == github.repository_owner
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::699475921438:role/github-actions-openclaw-terraform
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars
        env:
          TF_VARS_CONTENT: ${{ secrets.TF_VARS }}
        run: printf '%s' "$TF_VARS_CONTENT" > terraform.tfvars

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var="aws_profile="

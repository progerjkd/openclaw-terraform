name: Start / Stop OpenClaw

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action
        required: true
        type: choice
        options:
          - start
          - stop

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  AWS_DEFAULT_REGION: us-east-1

jobs:
  control:
    name: ${{ github.event.inputs.action == 'start' && 'Start' || 'Stop' }} OpenClaw
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::699475921438:role/github-actions-openclaw-terraform
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars
        env:
          TF_VARS_CONTENT: ${{ secrets.TF_VARS }}
        run: printf '%s' "$TF_VARS_CONTENT" > terraform.tfvars

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false

      - name: Make scripts executable
        run: chmod +x start.sh stop.sh status.sh attach-volume.sh

      - name: Start OpenClaw
        if: github.event.inputs.action == 'start'
        run: ./start.sh

      - name: Stop OpenClaw
        if: github.event.inputs.action == 'stop'
        run: ./stop.sh --yes

      - name: Status
        run: ./status.sh
